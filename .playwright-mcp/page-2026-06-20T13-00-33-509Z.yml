        - paragraph [ref=e41]: Diese Funktion hilft Ihnen, eine private Arztrechnung (GOÄ/PKV) besser zu verstehen. Sie geben die Angaben Ihrer Rechnung selbst ein, und wir erklären die enthaltenen Positionen in verständlicher Sprache und weisen auf mögliche Rückfragen hin. Es handelt sich um eine unverbindliche Orientierung, nicht um eine Prüfung Ihrer Rechnung.
      - note [ref=e42]:
        - img [ref=e43]
        - generic [ref=e45]: Unverbindliche Orientierung. Diese Funktion erklärt Ihre Angaben in verständlicher Form und nennt mögliche Rückfragen. Sie ist keine Rechtsberatung, keine abschließende Rechnungsprüfung und keine medizinische Auskunft. Bei Unsicherheit wenden Sie sich bitte an Ihre Praxis, Ihre private Krankenversicherung oder eine fachkundige Beratung.
      - note [ref=e46]: Ihre Eingaben werden nicht dauerhaft gespeichert und nur zur aktuellen Erklärung verarbeitet. Bitte geben Sie keine Namen, Geburtsdaten oder Diagnosen ein – die Abrechnungsangaben (Ziffer, Faktor, Anzahl, Betrag) oder der reine Rechnungstext genügen.
