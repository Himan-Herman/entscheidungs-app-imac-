            - heading "Professionell bleiben" [level=3] [ref=e279]
            - paragraph [ref=e280]: Das Produkt bleibt bewusst zurückhaltend, erklärt seine Grenzen klar und vermeidet einen überladenen oder alarmistischen Eindruck.
