          - paragraph [ref=e255]: Wofür MedScoutX gedacht ist
          - heading "Nicht Medizin ersetzen, sondern den gesamten Weg medizinisch sinnvoller begleiten" [level=2] [ref=e256]
          - paragraph [ref=e257]: "MedScoutX hilft dort, wo Versorgung leicht unübersichtlich wird: bei vielen Informationen, Sprachbarrieren, Dokumenten, Rückfragen, Nachverfolgung und dem Bedarf an individuellerer Begleitung zwischen Patient und Praxis."
